name: pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  CI_BUILD_JOBS: "16"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  cmake-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute excluded paths
        run: |
          mapfile -t EXCLUDED_PATHS_ARRAY < <(./scripts/ci_excluded_paths.sh)
          echo "EXCLUDED_PATHS=${EXCLUDED_PATHS_ARRAY[*]}" >> "$GITHUB_ENV"

      - name: Install cmake-format
        run: pip install cmakelang

      - name: Check CMake formatting
        run: |
          PRUNE_ARGS=(-path './.git' -o -path './build')
          for path in $EXCLUDED_PATHS; do
            PRUNE_ARGS+=(-o -path "./${path}" -o -path "./${path}/*")
          done

          FILES=$(find . \( "${PRUNE_ARGS[@]}" \) -prune -o \
            \( -name 'CMakeLists.txt' -o -name '*.cmake' \) -type f -print)
          echo "Checking format for: $FILES"

          fail=0
          for file in $FILES; do
            if ! diff -u "$file" <(cmake-format "$file"); then
              echo "::error file=$file::File is not properly formatted"
              fail=1
            fi
          done
          exit $fail

  whitespace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute excluded paths
        run: |
          mapfile -t EXCLUDED_PATHS_ARRAY < <(./scripts/ci_excluded_paths.sh)
          echo "EXCLUDED_PATHS=${EXCLUDED_PATHS_ARRAY[*]}" >> "$GITHUB_ENV"

      - name: Check trailing whitespace
        run: |
          # Exclut binaires, repo, build, submodules, artifacts courants, images, archives…
          EXCLUDE_DIRS="--exclude-dir=.git --exclude-dir=build --exclude-dir=.venv --exclude-dir=_deps --exclude-dir=Install"
          for path in $EXCLUDED_PATHS; do
            EXCLUDE_DIRS="$EXCLUDE_DIRS --exclude-dir=$path"
          done

          if grep -rI --line-number $EXCLUDE_DIRS \
              --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' \
              --exclude='*.gif' --exclude='*.pdf' --exclude='*.zip' \
              --exclude='*.tar' --exclude='*.tar.*' --exclude='*.7z' \
              --exclude='*.bin' --exclude='*.exe' --exclude='*.dll' \
              --exclude='*.so' --exclude='*.a' --exclude='*.o' \
              -P '[ \t]+$' .; then
            echo "Trailing whitespace found"
            exit 1
          fi

      - name: Check final newline at EOF
        shell: bash
        run: |
          fail=0
          PRUNE_ARGS=(-path './.git' -o -path './build')
          for path in $EXCLUDED_PATHS; do
            PRUNE_ARGS+=(-o -path "./${path}")
          done
          while IFS= read -r -d '' f; do
            case "$f" in
              *.png|*.jpg|*.jpeg|*.gif|*.pdf|*.zip|*.tar|*.tar.*|*.7z|*.bin|*.exe|*.dll|*.so|*.a|*.o) continue;;
            esac
            if [ -s "$f" ]; then
              if ! tail -c1 "$f" | od -An -t x1 | grep -q "0a"; then
                echo "::error file=$f::Missing final newline"
                fail=1
              fi
            fi
          done < <(find . \( "${PRUNE_ARGS[@]}" \) -prune -o -type f -print0)
          exit $fail

      - name: Check for CRLF line endings
        run: |
          EXCLUDE_SPECS=()
          for path in $EXCLUDED_PATHS; do
            EXCLUDE_SPECS+=(":!$path/**")
          done

          if git ls-files -z -- "${EXCLUDE_SPECS[@]}" | xargs -0 grep -Il $'\r' | grep .; then
            echo "CRLF line endings detected (use LF)"
            exit 1
          fi

  clang-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute excluded paths
        run: |
          mapfile -t EXCLUDED_PATHS_ARRAY < <(./scripts/ci_excluded_paths.sh)
          echo "EXCLUDED_PATHS=${EXCLUDED_PATHS_ARRAY[*]}" >> "$GITHUB_ENV"

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          PRUNE_ARGS=(-path './.git' -o -path './build')
          for path in $EXCLUDED_PATHS; do
            PRUNE_ARGS+=(-o -path "./${path}" -o -path "./${path}/*")
          done

          FILES=$(find . \( "${PRUNE_ARGS[@]}" \) -prune -o \
            -regex '.*\.\(cpp\|hpp\|c\|h\)' -type f -print)
          clang-format --dry-run --Werror $FILES

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute excluded paths
        run: |
          mapfile -t EXCLUDED_PATHS_ARRAY < <(./scripts/ci_excluded_paths.sh)
          echo "EXCLUDED_PATHS=${EXCLUDED_PATHS_ARRAY[*]}" >> "$GITHUB_ENV"

      - name: Run markdownlint
        run: |
          IGNORE_ARGS=()
          for path in $EXCLUDED_PATHS; do
            IGNORE_ARGS+=(--ignore "$path/**")
          done
          npx --yes markdownlint-cli@0.43.0 '**/*.md' "${IGNORE_ARGS[@]}"

  structural-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Enforce source/test structure boundaries
        run: ./scripts/ci_structural_guard.sh

  build:
    needs:
      [clang-format, cmake-format, whitespace, markdownlint, structural-guard]
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure and Build
        run: |
          cmake -S . -B build \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda-12.8/bin/nvcc \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=ON \
            -DENABLE_SANITIZERS=OFF
          cmake --build build -- -j"$CI_BUILD_JOBS"
        shell: bash

      - name: Save build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-folder
          path: build/

  build-clang:
    needs:
      [clang-format, cmake-format, whitespace, markdownlint, structural-guard]
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure and Build (Clang)
        run: |
          cmake -S . -B build-clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda-12.8/bin/nvcc \
            -DCUDAToolkit_ROOT=/usr/local/cuda-12.8 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=OFF \
            -DENABLE_SANITIZERS=OFF
          cmake --build build-clang -- -j"$CI_BUILD_JOBS"
        shell: bash

      - name: Save clang build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-folder-clang
          path: build-clang/

  build-clang-baseline:
    if: github.event_name == 'pull_request'
    needs:
      [clang-format, cmake-format, whitespace, markdownlint, structural-guard]
    runs-on: self-hosted

    steps:
      - name: Checkout base code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.sha }}
          submodules: recursive

      - name: Configure and Build baseline (Clang)
        run: |
          cmake -S . -B build-clang-baseline \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda-12.8/bin/nvcc \
            -DCUDAToolkit_ROOT=/usr/local/cuda-12.8 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=OFF \
            -DENABLE_SANITIZERS=OFF
          cmake --build build-clang-baseline -- -j"$CI_BUILD_JOBS"
        shell: bash

      - name: Save baseline clang build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-folder-clang-baseline
          path: build-clang-baseline/

  sanitizers:
    needs:
      [clang-format, cmake-format, whitespace, markdownlint, structural-guard]
    runs-on: self-hosted
    env:
      CUDA_VISIBLE_DEVICES: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure and Build (ASan + UBSan)
        run: |
          cmake -S . -B build-sanitizers \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda-12.8/bin/nvcc \
            -DCUDAToolkit_ROOT=/usr/local/cuda-12.8 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=OFF \
            -DENABLE_SANITIZERS=ON
          cmake --build build-sanitizers -- -j"$CI_BUILD_JOBS"
        shell: bash

      - name: Run sanitizer unit tests (CPU-only)
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1:detect_container_overflow=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          SANITIZER_GTEST_FILTER: "*-*Integration*:*_Integration*:*E2E*:*EndToEndInference*:*Cuda*:*CUDA*:*Gpu*:*GPU*:*PopulateResponseHandlesCudaOutputs:*CleanupSlotBuffersUnpinsStarpuMemory"
          SANITIZER_CRITICAL_PATHS_FILTER: "WarmupRunnerTest.WarmupRunnerRunNoCuda_Integration:WarmupRunnerTest.WarmupRunsOnCpuWhenCudaDisabled_Integration:WarmupRunnerTest.WarmupRunWithMockedWorkers_Integration:WarmupRunnerTest.WarmupRunnerRunZeroRequestNb_Integration:WarmupRunnerEdgesTest.RunNoCudaNoThreads_Integration"
        run: |
          chmod +x build-sanitizers/all_tests || true
          build-sanitizers/all_tests --gtest_filter="$SANITIZER_GTEST_FILTER"
          build-sanitizers/all_tests --gtest_filter="$SANITIZER_CRITICAL_PATHS_FILTER"
        shell: bash

  tsan:
    needs:
      [clang-format, cmake-format, whitespace, markdownlint, structural-guard]
    runs-on: self-hosted
    env:
      CUDA_VISIBLE_DEVICES: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure and Build (TSan targeted)
        run: |
          cmake -S . -B build-tsan \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda-12.8/bin/nvcc \
            -DCUDAToolkit_ROOT=/usr/local/cuda-12.8 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=OFF \
            -DENABLE_SANITIZERS=OFF \
            -DENABLE_TSAN=ON
          cmake --build build-tsan -- -j"$CI_BUILD_JOBS"
        shell: bash

      - name: Run targeted TSAN tests (CPU-only)
        env:
          TSAN_OPTIONS: halt_on_error=1:abort_on_error=1
          TSAN_GTEST_FILTER: "*ServerMainOrchestration*:*HandleModelInferAsync*:*AsyncServerContext*:*UnaryCallDataGuard*:*InferenceQueue*:*WarmupRunner*:*PrepareJobCompletionCallback*:*FinalizeJobCompletion*:*RecordJobMetricsUpdatesPerfObserver*:*WaitForNextJob*:*BatchingLoop*:*ReleaseInflightSlot*:*ReserveAndReleaseInflightSlotWorkTogetherWithLimit*:*RunDrainsQueueWhenStarpuSubmitAlwaysFails*-*Integration*:*_Integration*:*E2E*:*EndToEndInference*:*Cuda*:*CUDA*:*Gpu*:*GPU*"
          TSAN_CRITICAL_PATHS_FILTER: "WarmupRunnerTest.WarmupRunnerRunNoCuda_Integration:WarmupRunnerTest.WarmupRunsOnCpuWhenCudaDisabled_Integration:WarmupRunnerTest.WarmupRunWithMockedWorkers_Integration:WarmupRunnerTest.WarmupRunnerRunZeroRequestNb_Integration:WarmupRunnerEdgesTest.RunNoCudaNoThreads_Integration"
        run: |
          chmod +x build-tsan/all_tests || true
          build-tsan/all_tests --gtest_filter="$TSAN_GTEST_FILTER"
          build-tsan/all_tests --gtest_filter="$TSAN_CRITICAL_PATHS_FILTER"
        shell: bash

  clang-analyzer:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-folder
          path: build/

      - name: Prepare analyzer directory
        run: mkdir -p clang-analyzer

      - name: Run Clang Static Analyzer
        run: |
          scan-build --status-bugs -o clang-analyzer cmake --build build -- -j"$CI_BUILD_JOBS"
        shell: bash

      - name: Upload analyzer report
        uses: actions/upload-artifact@v7
        with:
          name: clang-analyzer-report
          path: clang-analyzer
          if-no-files-found: ignore

  test-and-coverage:
    needs: build
    runs-on: self-hosted
    env:
      # Incremental tightening to reduce CI churn while improving quality.
      COVERAGE_MIN_LINE: "72"
      CTEST_TIMEOUT_UNIT_SECONDS: "480"
      CTEST_TIMEOUT_INTEGRATION_SECONDS: "600"
      CTEST_TIMEOUT_E2E_SECONDS: "600"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-folder
          path: build/

      - name: Setup Python venv and install gcovr
        run: |
          python3 -m venv gcovr-venv
          source gcovr-venv/bin/activate
          pip install gcovr
        shell: bash

      - name: Restore execute permission on test binaries
        working-directory: build
        run: |
          find . -maxdepth 1 -type f \( -name '*_tests' -o -name 'all_tests' \) \
            -exec chmod +x {} +

      - name: Run unit tests
        working-directory: build
        run: |
          ctest --output-on-failure \
            --no-tests=error \
            --timeout "$CTEST_TIMEOUT_UNIT_SECONDS" \
            -L '^unit$' \
            --output-junit junit-unit.xml

      - name: Run integration tests
        working-directory: build
        run: |
          ctest --output-on-failure \
            --no-tests=error \
            --timeout "$CTEST_TIMEOUT_INTEGRATION_SECONDS" \
            -L '^integration$' \
            --output-junit junit-integration.xml

      - name: Run e2e tests
        working-directory: build
        run: |
          ctest --output-on-failure \
            --no-tests=error \
            --timeout "$CTEST_TIMEOUT_E2E_SECONDS" \
            -L '^e2e$' \
            --output-junit junit-e2e.xml

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-reports
          path: |
            build/junit-unit.xml
            build/junit-integration.xml
            build/junit-e2e.xml

      - name: Generate coverage report using gcovr in venv
        working-directory: build
        run: |
          ROOTDIR="$(cd .. && pwd)"
          ../gcovr-venv/bin/gcovr --root "$ROOTDIR" \
            --filter "$ROOTDIR/src" \
            --exclude '^build/.*' \
            --exclude '^build/_deps/.*' \
            --exclude '^tests/.*' \
            --exclude '^external/.*' \
            --exclude '^usr/.*' \
            --exclude '^Install/.*' \
            --html --html-details -o coverage.html

          ../gcovr-venv/bin/gcovr --root "$ROOTDIR" \
            --filter "$ROOTDIR/src" \
            --exclude '^build/.*' \
            --exclude '^build/_deps/.*' \
            --exclude '^tests/.*' \
            --exclude '^external/.*' \
            --exclude '^usr/.*' \
            --exclude '^Install/.*' \
            --txt > coverage.txt

          ../gcovr-venv/bin/gcovr --root "$ROOTDIR" \
            --filter "$ROOTDIR/src" \
            --exclude '^build/.*' \
            --exclude '^build/_deps/.*' \
            --exclude '^tests/.*' \
            --exclude '^external/.*' \
            --exclude '^usr/.*' \
            --exclude '^Install/.*' \
            --lcov -o coverage.lcov

      - name: Enforce minimum line coverage
        working-directory: build
        run: |
          ROOTDIR="$(cd .. && pwd)"
          ../gcovr-venv/bin/gcovr --root "$ROOTDIR" \
            --filter "$ROOTDIR/src" \
            --exclude '^build/.*' \
            --exclude '^build/_deps/.*' \
            --exclude '^tests/.*' \
            --exclude '^external/.*' \
            --exclude '^usr/.*' \
            --exclude '^Install/.*' \
            --fail-under-line "$COVERAGE_MIN_LINE"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/coverage.lcov
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-coverage
          verbose: true

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build/coverage.html

      - name: Upload coverage summary
        uses: actions/upload-artifact@v7
        with:
          name: coverage-summary
          path: build/coverage.txt

  perf-smoke:
    if: github.event_name == 'pull_request'
    needs: [build-clang, build-clang-baseline, test-and-coverage]
    runs-on: self-hosted
    timeout-minutes: 45
    env:
      PERF_SERVER_ADDR: "127.0.0.1:50062"
      PERF_SERVER_CONFIG: "../ci/perf/resnet152_ci_perf_gpu_only.yml"
      PERF_SCHEDULE_CSV: "../ci/perf/ci_perf_resnet.csv"
      PERF_EXPECTED_REQUESTS: "6300"
      PERF_MAX_THROUGHPUT_DROP_PCT: "10"
      PERF_MAX_SERVER_OVERALL_P95_REGRESSION_PCT: "15"
      PERF_MODEL_PATH: "models/resnet152.pt"
      PERF_TORCH_VERSION: "2.2.2"
      PERF_TORCHVISION_VERSION: "0.17.2"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download clang build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-folder-clang
          path: build-clang/

      - name: Download baseline clang build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-folder-clang-baseline
          path: build-clang-baseline/

      - name: Export ResNet152 TorchScript model for perf CI
        shell: bash
        run: |
          set -euo pipefail

          rm -rf perf-model-venv
          python3 -m venv perf-model-venv
          ./perf-model-venv/bin/pip install --upgrade pip
          ./perf-model-venv/bin/pip install \
            "torch==${PERF_TORCH_VERSION}" \
            "torchvision==${PERF_TORCHVISION_VERSION}"

          ./perf-model-venv/bin/python models/import_resnet.py \
            --model resnet152 \
            --no-pretrained \
            --out "$PERF_MODEL_PATH"

          test -s "$PERF_MODEL_PATH"

      - name: Run baseline perf benchmark
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/run_perf_smoke.sh \
            --build-dir build-clang-baseline \
            --server "$PERF_SERVER_ADDR" \
            --config "$PERF_SERVER_CONFIG" \
            --schedule-csv "$PERF_SCHEDULE_CSV" \
            --output-dir perf-artifacts

      - name: Run candidate perf benchmark
        shell: bash
        run: |
          set -euo pipefail

          bash scripts/run_perf_smoke.sh \
            --build-dir build-clang \
            --server "$PERF_SERVER_ADDR" \
            --config "$PERF_SERVER_CONFIG" \
            --schedule-csv "$PERF_SCHEDULE_CSV" \
            --output-dir perf-artifacts

      - name: Compare candidate perf against baseline
        shell: bash
        run: |
          set -euo pipefail

          python3 scripts/compare_perf_summaries.py \
            --baseline build-clang-baseline/perf-artifacts/resnet152-summary.json \
            --candidate build-clang/perf-artifacts/resnet152-summary.json \
            --latency-metric server_overall \
            --max-latency-regression-pct "$PERF_MAX_SERVER_OVERALL_P95_REGRESSION_PCT" \
            --max-throughput-drop-pct "$PERF_MAX_THROUGHPUT_DROP_PCT" \
            --max-rejected 0 \
            --expected-requests "$PERF_EXPECTED_REQUESTS"

      - name: Upload perf smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-smoke-artifacts
          path: |
            build-clang-baseline/perf-artifacts/server.log
            build-clang-baseline/perf-artifacts/client.log
            build-clang-baseline/perf-artifacts/readiness.log
            build-clang-baseline/perf-artifacts/resnet152-summary.json
            build-clang/perf-artifacts/server.log
            build-clang/perf-artifacts/client.log
            build-clang/perf-artifacts/readiness.log
            build-clang/perf-artifacts/resnet152-summary.json
          if-no-files-found: ignore
